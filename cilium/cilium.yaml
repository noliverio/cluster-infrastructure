apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: cilium
    repoURL: quay.io/cilium/charts/cilium
    targetRevision: 1.19.4
    helm:
    valueFiles:
    - values.yaml
  destination:
    name: "in-cluster"
    namespace: cilium
