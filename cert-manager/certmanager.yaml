apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
spec:
  project: default
  source:
    chart: cert-manager
    repoURL: quay.io/jetstack/charts/cert-manager
    targetRevision: v1.19.2
    helm:
    valueFiles:
    - values.yaml
  destination:
    name: "in-cluster"
    namespace: cert-manager
