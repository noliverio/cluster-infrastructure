apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: {{ .Values.spec.argoNameSpace }}
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: cilium
    repoURL: quay.io/cilium/charts/cilium
    targetRevision: 1.19.4
    helm:
      valuesObject:
        hubble:
          relay:
            enabled: true
          ui:
            enabled: true
  destination:
    name: "in-cluster"
    namespace: cilium
