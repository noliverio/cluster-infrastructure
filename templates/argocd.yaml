apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo
  namespace: {{ .Values.spec.argoNameSpace }}
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: argo-cd
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: 9.5.14
    helm:
      valuesObject:
        global:
          domain: argocd.internal.coffeeandacomputer.com
        server:
          ingress:
            enabled: true
            ingressClassName: nginx 
        configs:
          params:
          server.insecure: true
          repositories:
            private-repo:
              url: https://github.com/noliverio/cluster-infrastructure
  syncPolicy:
    automated:
      enabled: true
      selfHeal: true
      prune: true
  destination:
    name: "in-cluster"
    namespace: argocd
