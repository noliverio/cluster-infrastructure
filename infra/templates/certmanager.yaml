apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  {{ template "common-app-metadata" . }}
spec:
  project: default
  source:
    chart: cert-manager
    repoURL: quay.io/jetstack/charts/cert-manager
    targetRevision: v1.19.2
    helm:
      valuesObject:
        crds:
          enabled: true
  destination:
    name: "in-cluster"
    namespace: cert-manager
  {{ template "default-sync-policy" . }}
