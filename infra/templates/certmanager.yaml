apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: {{ .Values.spec.argoNameSpace }}
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: cert-manager
    repoURL: quay.io/jetstack/charts/cert-manager
    targetRevision: v1.19.2
    helm:
      valuesObject:
        crds:
          enabled: true
  destination:
    name: "in-cluster"
    namespace: cert-manager
