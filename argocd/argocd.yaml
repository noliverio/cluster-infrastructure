apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: argocd
    repoURL: https://argoproj.github.io/argo-helm
    helm:
      valuesObject:
        global:
          domain: argocd.internal.coffeeandacomputer.com
        server:
          ingress:
            enabled: true
            ingressClassName: nginx 
        configs:
          params:
          server.insecure: true
          repositories:
            private-repo:
              url: https://github.com/noliverio/cluster-infrastructure
  destination:
    name: "in-cluster"
    namespace: argocd
